<html>
    <head>
        <center>
        <title>Student Form</title>
        
    </head>
     <script>
        var students=[]
         function addStudent(){

            var studentName=document.getElementById("name").value;
            var studentUsn=document.getElementById("usn").value;   
            var studentPhone=document.getElementById("phone").value;
           
            
            var student={
                name:studentName,
                usn:studentUsn,
                phone:studentPhone
                

            }
        
            students.push(student)
            console.log(students)

            
            //1.student list
            let studentListNode=document.createElement('div')
            studentListNode.setAttribute("id","studentList")
            studentListNode.style="display:flex;flex-direction:column;align-items:center;background-color:grey;border-radius:20px;margin-top: 30px;"
            document.body.appendChild(studentListNode)
            
        
            //2.add item to the list
            //Name HTML tag
        
            let nameNode=document.createElement('h4')
            nameNode.style="color:white;font-family:curcive;margin:10px;"
            nameNode.innerText="Name:"+student.name
            studentListNode.appendChild(nameNode)
            

            let usnNode=document.createElement('h4')
            usnNode.style="color:white;font-family:curcive;margin:10px;"
            usnNode.innerText="USN:"+student.usn
            studentListNode.appendChild(usnNode)
            

            let phoneNode=document.createElement('h4')
            phoneNode.style="color:white;font-family:curcive;margin:10px;"
            phoneNode.innerText="Phone:"+student.phone
            studentListNode.appendChild(phoneNode)

        
         }
  
        </script>


        <body>
            <h1>Student Details</h1>
            <style>
                h1{
                font-family:cursive;
                font-weight:bold;
                font-size:48px;
                color:black;
            }
            button:hover {
      background-color: #1d4ed8;
    }
            </style>
            
        
            
            <form style="
            align-items: center;
            background-color: rgb(38, 205, 251);
            color: rgb(8, 3, 0);
            padding: 20px;
            width: 300px;
            border-radius: 20px;
            align-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;">
                
                <label for="Name">Name:</label>
                <input
                type="text"
                placeholder="fullname"
                id="name"/>
                <br></br>
                

                <label for="USN">USN:</label>
                <input
                type="text"
                placeholder="usn"
                id="usn"/>
                <br></br>
                

        
                <label for="Phone">Phone:</label>
                <input
                type="tel"
                pattern="pattern="[0-9]-{3}-[0-9]-{2}-{0-9}-{3}-[0-9]-{2}
                placeholder="phone"
                id="phone"/>
                <br></br>

               
                
                
                   
            </form>
            <button onclick="addStudent()">Submit</button>
        </center>
        </body>
        

</html>
